<!DOCTYPE html>
<html>
<head>
<style>
	table{
		border-collapse: collapse;
		width: 300px;
	}
	th,td {
		border: 1px solid black;
		height: 50px;
		width: 500px;
		text-align: center;
	} 
</style>
</head>
<body>
	<h1>calculator</h1>
	<table>
		<tr>
			<td class="op">red</td>
			<td class="op">degs</td>
			<td class="op">x!</td>
			<td class="op">(</td>
			<td class="op">)</td>
			<td class="op">%</td>
			<td class="op">ac</td>
		</tr>
		<tr>
			<td>inv</td>
			<td>sin</td>
			<td>in</td>
			<td>7</td>
			<td>8</td>
			<td>9</td>
			<td class="op">+</td>
		</tr>
		<tr>
			<td>3.14</td>
			<td>cos</td>
			<td>log</td>
			<td>4</td>
			<td>5</td>
			<td>6</td>
			<td class="op">x</td>
		</tr>
		<tr>
			<td>e</td>
			<td>tan</td>
			<td>x</td>
			<td>1</td>
			<td>2</td>
			<td>3</td>
			<td class="op">-</td>
		</tr>
		<tr>
			<td>ans</td>
			<td>exp</td>
			<td>x<sub>y</sub></td>
			<td>0</td>
			<td>.</td>
			<td>+</td>
			<td class="equal">=</td>
		</tr>

	</table>

</body>
</html>
